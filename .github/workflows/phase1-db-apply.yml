name: Phase 1 · DB Apply (gated)

# WHY MANUAL-ONLY ----------------------------------------------------------
# Applying a migration is a SENSITIVE, human-gated action (global rules
# #11/#12, onboarding §4). This workflow NEVER runs on push and NEVER on a
# schedule. It runs only when:
#   1. a human dispatches it AND types the confirmation phrase, and
#   2. the `production-db` Environment's required reviewers approve the run
#      (configure reviewers = DevOps + Security per agent-review-matrix.md #8).
#
# It encapsulates the runbook in docs/database/HANDOFF-phase1-apply.md §3
# (Option A — Supabase CLI), then runs the post-apply verification (§4 + §5).
# It applies ONLY the forward migration. It does NOT run the rollback and does
# NOT run the first-admin bootstrap (both are out of scope by design).
#
# SECRETS: read exclusively from the `production-db` Environment. Never echoed,
# never written to a versioned file. Connection coordinates that are NOT
# secret (host/user/port/ref) live as Environment *variables* (vars.*), so the
# single real secret in a URL is the DB password (masked below).
# --------------------------------------------------------------------------

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type APPLY-PHASE1 to confirm applying the Phase 1 migration to the remote project.'
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: phase1-db-apply
  cancel-in-progress: false

env:
  # Non-secret: the project ref appears in the project URL.
  SUPABASE_PROJECT_REF: pwbkplzyzmortwjjpcbg

jobs:
  guard:
    name: Confirm intent
    runs-on: ubuntu-latest
    steps:
      - name: Validate confirmation phrase
        run: |
          set -euo pipefail
          if [ "${{ inputs.confirm }}" != "APPLY-PHASE1" ]; then
            echo "::error::Confirmation phrase mismatch — aborting with no apply."
            exit 1
          fi
          echo "Confirmation accepted."

  apply:
    name: Apply Phase 1 migration
    needs: guard
    runs-on: ubuntu-latest
    # Gates the actual apply behind the Environment's required reviewers
    # (DevOps + Security) — this is the execution-time human approval.
    environment: production-db
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Build masked DB URL (session pooler — IPv4-safe on GitHub runners)
        env:
          DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          DB_HOST: ${{ vars.SUPABASE_DB_HOST }}
          DB_PORT: ${{ vars.SUPABASE_DB_PORT }}
          DB_USER: ${{ vars.SUPABASE_DB_USER }}
        run: |
          set -euo pipefail
          : "${DB_PASSWORD:?missing secret SUPABASE_DB_PASSWORD in Environment production-db}"
          : "${DB_HOST:?missing variable SUPABASE_DB_HOST in Environment production-db}"
          user="${DB_USER:-postgres.${SUPABASE_PROJECT_REF}}"
          port="${DB_PORT:-5432}"
          enc_pw="$(jq -rn --arg v "$DB_PASSWORD" '$v|@uri')"
          url="postgresql://${user}:${enc_pw}@${DB_HOST}:${port}/postgres?sslmode=require"
          echo "::add-mask::${url}"
          echo "SUPABASE_DB_URL=${url}" >> "$GITHUB_ENV"

      - name: Link project (CLI auth)
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: supabase link --project-ref "$SUPABASE_PROJECT_REF"

      - name: Apply forward migration (atomic; only Phase 1 exists)
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          set -euo pipefail
          # Runbook §3 Option A. The migration file is begin/commit (atomic);
          # on error `db push` exits non-zero and this job fails — no partial state.
          # --db-url pins the session pooler (deterministic IPv4 path on runners).
          supabase db push --db-url "$SUPABASE_DB_URL"

  verify:
    name: Post-apply verification (§4 structural + §5 empirical)
    needs: apply
    runs-on: ubuntu-latest
    environment: production-db
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install psql client
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends postgresql-client

      - name: Build masked DB URL
        env:
          DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          DB_HOST: ${{ vars.SUPABASE_DB_HOST }}
          DB_PORT: ${{ vars.SUPABASE_DB_PORT }}
          DB_USER: ${{ vars.SUPABASE_DB_USER }}
        run: |
          set -euo pipefail
          : "${DB_PASSWORD:?missing secret SUPABASE_DB_PASSWORD}"
          : "${DB_HOST:?missing variable SUPABASE_DB_HOST}"
          user="${DB_USER:-postgres.${SUPABASE_PROJECT_REF}}"
          port="${DB_PORT:-5432}"
          enc_pw="$(jq -rn --arg v "$DB_PASSWORD" '$v|@uri')"
          url="postgresql://${user}:${enc_pw}@${DB_HOST}:${port}/postgres?sslmode=require"
          echo "::add-mask::${url}"
          echo "SUPABASE_DB_URL=${url}" >> "$GITHUB_ENV"

      - name: Structural (§4) + empirical (§5) assertions
        run: |
          set -euo pipefail
          # Any failed assertion raises -> ON_ERROR_STOP fails the job (and the run).
          psql "$SUPABASE_DB_URL" -v ON_ERROR_STOP=1 \
            -f supabase/tests/phase1_post_apply_verify.sql

      - name: Complementary — service-key API negative check (§5, best-effort)
        env:
          SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          PROJECT_REF: ${{ env.SUPABASE_PROJECT_REF }}
        run: |
          set -euo pipefail
          if [ -z "${SERVICE_KEY:-}" ]; then
            echo "SUPABASE_SERVICE_ROLE_KEY not provisioned — skipping API-level check."
            echo "Authoritative immutability proof already ran at the DB level (psql, set role service_role)."
            exit 0
          fi
          # Best-effort: prove the service key cannot wipe audit_events via the
          # PostgREST API. The trigger fires below the service_role bypass, so a
          # mutation that reaches a row must return a non-2xx. We target a probe
          # row id that does not exist, so a 2xx here only means "0 rows", not a
          # security failure; a 5xx/4xx from the trigger is the positive signal.
          # The DB-level psql test above remains the authoritative SEC-F16 proof.
          code="$(curl -s -o /dev/null -w '%{http_code}' \
            -X DELETE \
            -H "apikey: ${SERVICE_KEY}" \
            -H "Authorization: Bearer ${SERVICE_KEY}" \
            "https://${PROJECT_REF}.supabase.co/rest/v1/audit_events?action=eq.__never_exists__")" || true
          echo "API DELETE returned HTTP ${code} (informational; DB-level proof is authoritative)."
