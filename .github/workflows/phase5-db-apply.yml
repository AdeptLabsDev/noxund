name: Phase 5 · DB Apply (gated)

# WHY MANUAL-ONLY ----------------------------------------------------------
# Applying a migration is a SENSITIVE, human-gated action (global rules
# #11/#12, onboarding §4). This workflow NEVER runs on push and NEVER on a
# schedule. It runs only when:
#   1. a human dispatches it AND types the confirmation phrase, and
#   2. the `production-db` Environment's required reviewers approve the run
#      (reviewers = DevOps + Security per agent-review-matrix.md #8).
# The Environment also restricts dispatch to `main` (deployment branch rule):
# a workflow_dispatch from any branch ≠ main is DENIED the Environment/secrets
# (SEC-F18) — closing the "run a modified workflow from a branch" vector.
#
# Mirrors the Phase 1-4 hardened pipeline (SEC-F17 SHA-pin, masked URL, atomic
# apply, service-role NOT used) — see .github/workflows/phase4-db-apply.yml,
# docs/database/HANDOFF-phase5-design.md and docs/security/SEC-0014. It applies
# ONLY the forward migration (supabase db push pushes the pending Phase 5
# migration 20260620000005_phase5_computed_metrics_reports.sql; Phases 1-4 are
# already tracked as applied). It does NOT run the rollback: published is FROZEN
# and the computed chain (artist_metric_videos) is the provenance trail —
# rollback is admissible only for disposable runs, never in production
# (HANDOFF-phase5-design §8).
#
# PHASE 5 DELTA vs Phase 4: the forward migration closes the raw→computed→snapshot
# chain — 6 tables (video_artist_mappings / channel_eligibility / artist_metrics /
# artist_metric_videos / reports / report_items), 3 enums, 7 functions (5 trigger
# guards + 2 IMMUTABLE structural evidence validators), 7 triggers, 16 FKs all
# ON DELETE RESTRICT, 2 structural-evidence CHECKs + reports.published_at CHECK,
# RLS-enable + revoke on all 6, ZERO policy / ZERO VIEW (Phase 9 stays vetoed —
# SEC-0001 §0). The verify job proves these empirically across BOTH role paths,
# embedding the DEC-0009 errcode lesson (restrict_violation on the grant-holder
# path; restrict_violation OR insufficient_privilege on the service_role path),
# including the F5-03A/05A/06A/01A probes.
#
# NOT-IN-SCOPE: P5-REPRO-01 (the canonical 2-round reproducibility proof) is a
# data-engine / first-publish gate, NOT this migration apply (HANDOFF §12).
#
# SECRETS: read exclusively from the `production-db` Environment. Never echoed,
# never written to a versioned file. The service-role key is NOT used here
# (SEC-F19): the snapshot freeze + conditional published-lineage guard are proven
# at the DB level (set role service_role), below the service_role — grants/RLS
# alone do not suffice (SEC-D03/F01).
# --------------------------------------------------------------------------

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type APPLY-PHASE5 to confirm applying the Phase 5 migration to the remote project.'
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: phase5-db-apply
  cancel-in-progress: false

env:
  # Non-secret: the project ref appears in the project URL.
  SUPABASE_PROJECT_REF: pwbkplzyzmortwjjpcbg

jobs:
  guard:
    name: Confirm intent
    runs-on: ubuntu-latest
    steps:
      - name: Validate confirmation phrase
        run: |
          set -euo pipefail
          if [ "${{ inputs.confirm }}" != "APPLY-PHASE5" ]; then
            echo "::error::Confirmation phrase mismatch — aborting with no apply."
            exit 1
          fi
          echo "Confirmation accepted."

  apply:
    name: Apply Phase 5 migration
    needs: guard
    runs-on: ubuntu-latest
    # Gates the actual apply behind the Environment's required reviewers
    # (DevOps + Security) — this is the execution-time human approval.
    environment: production-db
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - name: Install Supabase CLI
        uses: supabase/setup-cli@ab058987d8d6c725971f6cf9d0b5c98467e30bd1  # v1.7.1
        with:
          version: latest

      - name: Build masked DB URL (session pooler — IPv4-safe on GitHub runners)
        env:
          DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          DB_HOST: ${{ vars.SUPABASE_DB_HOST }}
          DB_PORT: ${{ vars.SUPABASE_DB_PORT }}
          DB_USER: ${{ vars.SUPABASE_DB_USER }}
        run: |
          set -euo pipefail
          : "${DB_PASSWORD:?missing secret SUPABASE_DB_PASSWORD in Environment production-db}"
          : "${DB_HOST:?missing variable SUPABASE_DB_HOST in Environment production-db}"
          user="${DB_USER:-postgres.${SUPABASE_PROJECT_REF}}"
          port="${DB_PORT:-5432}"
          enc_pw="$(jq -rn --arg v "$DB_PASSWORD" '$v|@uri')"
          url="postgresql://${user}:${enc_pw}@${DB_HOST}:${port}/postgres?sslmode=require"
          echo "::add-mask::${url}"
          echo "SUPABASE_DB_URL=${url}" >> "$GITHUB_ENV"

      - name: Link project (CLI auth)
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: supabase link --project-ref "$SUPABASE_PROJECT_REF"

      - name: Apply forward migration (atomic; pending = Phase 5)
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          set -euo pipefail
          # The migration file is begin/commit (atomic); on error `db push` exits
          # non-zero and this job fails — no partial state. `db push` applies only
          # pending migrations (Phases 1-4 already tracked), i.e. the Phase 5 file
          # 20260620000005_phase5_computed_metrics_reports.sql.
          # Forward-only: do NOT run the rollback (published is FROZEN; the computed
          # chain is the provenance trail — see HANDOFF-phase5-design §8).
          # --db-url pins the session pooler (deterministic IPv4 path on runners).
          supabase db push --db-url "$SUPABASE_DB_URL"

  verify:
    name: Post-apply verification (§4 structural + §5 empirical)
    needs: apply
    runs-on: ubuntu-latest
    environment: production-db
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - name: Install psql client
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends postgresql-client

      - name: Build masked DB URL
        env:
          DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          DB_HOST: ${{ vars.SUPABASE_DB_HOST }}
          DB_PORT: ${{ vars.SUPABASE_DB_PORT }}
          DB_USER: ${{ vars.SUPABASE_DB_USER }}
        run: |
          set -euo pipefail
          : "${DB_PASSWORD:?missing secret SUPABASE_DB_PASSWORD}"
          : "${DB_HOST:?missing variable SUPABASE_DB_HOST}"
          user="${DB_USER:-postgres.${SUPABASE_PROJECT_REF}}"
          port="${DB_PORT:-5432}"
          enc_pw="$(jq -rn --arg v "$DB_PASSWORD" '$v|@uri')"
          url="postgresql://${user}:${enc_pw}@${DB_HOST}:${port}/postgres?sslmode=require"
          echo "::add-mask::${url}"
          echo "SUPABASE_DB_URL=${url}" >> "$GITHUB_ENV"

      - name: Structural (§4) + empirical (§5) assertions
        run: |
          set -euo pipefail
          # Any failed assertion raises -> ON_ERROR_STOP fails the job (and the run).
          # Proves errcode parity across BOTH role paths (DEC-0009) and the
          # F5-03A/05A/06A/01A probes.
          psql "$SUPABASE_DB_URL" -v ON_ERROR_STOP=1 \
            -f supabase/tests/phase5_post_apply_verify.sql
