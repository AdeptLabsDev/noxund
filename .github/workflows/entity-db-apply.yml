name: Entity Resolution Candidates · DB Apply (gated) — DEC-0014

# WHY MANUAL-ONLY ----------------------------------------------------------
# Applying a migration is a SENSITIVE, human-gated action (global rules
# #11/#12, onboarding §4). This workflow NEVER runs on push and NEVER on a
# schedule. It runs only when:
#   1. a human dispatches it AND types the confirmation phrase, and
#   2. the `production-db` Environment's required reviewers approve the run
#      (reviewers = DevOps + Security per agent-review-matrix.md #8).
# The Environment also restricts dispatch to `main` (deployment branch rule):
# a workflow_dispatch from any branch ≠ main is DENIED the Environment/secrets
# (SEC-F18) — closing the "run a modified workflow from a branch" vector.
#
# FAITHFUL MIRROR of .github/workflows/phase5-db-apply.yml (SEC-F17 SHA-pin,
# masked URL, service-role NOT used, atomic begin/commit apply, verify
# ON_ERROR_STOP=1). It inherits the SEC-0014/phase5 governance posture. It
# REUSES the already-configured `production-db` Environment (same secrets
# SUPABASE_DB_PASSWORD/ACCESS_TOKEN + vars HOST/PORT/USER + required reviewers):
# NO new secret, NO configure_env. Any DEVIATION from the phase5 template (new
# permissions/secrets/triggers, relaxed gate, on:push/schedule) must go to
# Security review (matrix #8).
#
# >>> CRITICAL — APPLY SCOPE = ONLY 20260620000006 (NEVER 0007/producer_events) <<<
# `supabase db push` applies ALL pending migrations. Migration 0007
# (phase6_producer_events) is authored but PARKED. A blind mirror of `db push`
# would also apply 0007 — violating the human condition "producer_events/0007
# untouched" and the Phase 6 apply gate.
#
# CHOSEN MECHANISM (declared explicitly, DEC-0014 §5 / §sequencing):
#   • LANDING DISCIPLINE: ONLY 0006 (migration + verify + rollback) and this
#     workflow land on `main` via the reviewed path (no direct push — global
#     rules §7). 0007 stays PARKED/uncommitted → absent from the CI checkout →
#     `db push` sees ONLY 0006 as pending (0001–0005 already tracked/applied).
#   • FAIL-CLOSED PREFLIGHT (defense-in-depth, below): before applying, assert
#     the pending set is EXACTLY {20260620000006} — at the checkout file level
#     (no migration file newer than 0006 may exist) AND against remote truth
#     (`db push --dry-run`). If 0007 (or anything else) appears pending/present,
#     the job ABORTS with NO apply.
#
# This migration is ADDITIVE (DEC-0014 §3): only CREATE of a new table/enum/
# indexes; ZERO ALTER of any applied/frozen Phase 5 table; reuses the existing
# enum public.video_artist_method. It does NOT run the rollback (forward-only;
# rollback only if the verify fails). It does NOT unlock Phase 9 (zero policy/
# view). It does NOT apply 0007/producer_events.
#
# SECRETS: read exclusively from the `production-db` Environment. Never echoed,
# never written to a versioned file. The service-role key is NOT used here
# (SEC-F19): default-deny is proven at the DB level (set role anon/authenticated)
# in the verify, below the service_role.
# --------------------------------------------------------------------------

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type APPLY-ENTITY-CANDIDATES to confirm applying ONLY migration 20260620000006 (entity_resolution_candidates) to the remote project.'
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: entity-db-apply
  cancel-in-progress: false

env:
  # Non-secret: the project ref appears in the project URL.
  SUPABASE_PROJECT_REF: pwbkplzyzmortwjjpcbg
  # The ONLY migration this workflow is allowed to apply. The preflight aborts
  # if the pending/checkout set is anything other than exactly this version.
  EXPECTED_MIGRATION: '20260620000006'

jobs:
  guard:
    name: Confirm intent
    runs-on: ubuntu-latest
    steps:
      - name: Validate confirmation phrase
        run: |
          set -euo pipefail
          if [ "${{ inputs.confirm }}" != "APPLY-ENTITY-CANDIDATES" ]; then
            echo "::error::Confirmation phrase mismatch — aborting with no apply."
            exit 1
          fi
          echo "Confirmation accepted."

  apply:
    name: Apply entity_resolution_candidates migration (0006 only)
    needs: guard
    runs-on: ubuntu-latest
    # Gates the actual apply behind the Environment's required reviewers
    # (DevOps + Security) — this is the execution-time human approval.
    environment: production-db
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - name: Install Supabase CLI
        uses: supabase/setup-cli@ab058987d8d6c725971f6cf9d0b5c98467e30bd1  # v1.7.1
        with:
          version: latest

      - name: Build masked DB URL (session pooler — IPv4-safe on GitHub runners)
        env:
          DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          DB_HOST: ${{ vars.SUPABASE_DB_HOST }}
          DB_PORT: ${{ vars.SUPABASE_DB_PORT }}
          DB_USER: ${{ vars.SUPABASE_DB_USER }}
        run: |
          set -euo pipefail
          : "${DB_PASSWORD:?missing secret SUPABASE_DB_PASSWORD in Environment production-db}"
          : "${DB_HOST:?missing variable SUPABASE_DB_HOST in Environment production-db}"
          user="${DB_USER:-postgres.${SUPABASE_PROJECT_REF}}"
          port="${DB_PORT:-5432}"
          enc_pw="$(jq -rn --arg v "$DB_PASSWORD" '$v|@uri')"
          url="postgresql://${user}:${enc_pw}@${DB_HOST}:${port}/postgres?sslmode=require"
          echo "::add-mask::${url}"
          echo "SUPABASE_DB_URL=${url}" >> "$GITHUB_ENV"

      - name: Link project (CLI auth)
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: supabase link --project-ref "$SUPABASE_PROJECT_REF"

      - name: Preflight — assert apply scope is EXACTLY {0006} (fail-closed)
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          set -euo pipefail
          shopt -s nullglob

          # (A) CHECKOUT FILE GUARD — no migration newer than 0006 may be present.
          #     Catches 0007/producer_events (or any later migration) leaking onto
          #     `main`. Filenames are 14-digit zero-padded timestamps, so lexical
          #     comparison == numeric comparison. Also requires 0006 to be present.
          found_expected=0
          for f in supabase/migrations/*.sql; do
            base="$(basename "$f")"
            ver="${base%%_*}"
            case "$ver" in
              ''|*[!0-9]*)
                echo "::error::Preflight: unparseable migration filename '$base' — aborting with no apply."
                exit 1 ;;
            esac
            if [[ "$ver" > "$EXPECTED_MIGRATION" ]]; then
              echo "::error::Preflight: migration '$base' is NEWER than ${EXPECTED_MIGRATION} (0007/producer_events must stay PARKED). Aborting with no apply."
              exit 1
            fi
            if [ "$ver" = "$EXPECTED_MIGRATION" ]; then
              found_expected=1
            fi
          done
          if [ "$found_expected" -ne 1 ]; then
            echo "::error::Preflight: expected migration ${EXPECTED_MIGRATION} not found in checkout. Aborting with no apply."
            exit 1
          fi

          # (B) REMOTE-TRUTH GUARD — what would `db push` actually apply? Must be
          #     EXACTLY {0006}. Catches baseline drift (e.g. an unapplied 0005 that
          #     would make >1 migration pending). --dry-run NEVER applies anything.
          dry="$(supabase db push --dry-run --db-url "$SUPABASE_DB_URL" 2>&1)"
          echo "$dry"
          pending="$(printf '%s\n' "$dry" | grep -oE '[0-9]{14}' | sort -u | tr '\n' ' ' | sed 's/ *$//')"
          if [ "$pending" != "$EXPECTED_MIGRATION" ]; then
            echo "::error::Preflight: pending migration set is not exactly {${EXPECTED_MIGRATION}}. Got: [${pending}]. Aborting with no apply (0007 must NOT be applied)."
            exit 1
          fi
          echo "Preflight OK — apply scope confirmed = {${EXPECTED_MIGRATION}} (entity_resolution_candidates) only."

      - name: Apply forward migration (atomic; pending = 0006 only)
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          set -euo pipefail
          # The migration file is begin/commit (atomic); on error `db push` exits
          # non-zero and this job fails — no partial state. `db push` applies only
          # pending migrations; the preflight has just proven that set is EXACTLY
          # {20260620000006} (entity_resolution_candidates). 0007/producer_events
          # is PARKED and must NOT be applied here.
          # Forward-only: do NOT run the rollback (rollback only if verify fails).
          # --db-url pins the session pooler (deterministic IPv4 path on runners).
          supabase db push --db-url "$SUPABASE_DB_URL"

  verify:
    name: Post-apply verification (§4 structural + §5 empirical)
    needs: apply
    runs-on: ubuntu-latest
    environment: production-db
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - name: Install psql client
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends postgresql-client

      - name: Build masked DB URL
        env:
          DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          DB_HOST: ${{ vars.SUPABASE_DB_HOST }}
          DB_PORT: ${{ vars.SUPABASE_DB_PORT }}
          DB_USER: ${{ vars.SUPABASE_DB_USER }}
        run: |
          set -euo pipefail
          : "${DB_PASSWORD:?missing secret SUPABASE_DB_PASSWORD}"
          : "${DB_HOST:?missing variable SUPABASE_DB_HOST}"
          user="${DB_USER:-postgres.${SUPABASE_PROJECT_REF}}"
          port="${DB_PORT:-5432}"
          enc_pw="$(jq -rn --arg v "$DB_PASSWORD" '$v|@uri')"
          url="postgresql://${user}:${enc_pw}@${DB_HOST}:${port}/postgres?sslmode=require"
          echo "::add-mask::${url}"
          echo "SUPABASE_DB_URL=${url}" >> "$GITHUB_ENV"

      - name: Structural (§4) + empirical (§5) assertions
        run: |
          set -euo pipefail
          # Any failed assertion raises -> ON_ERROR_STOP fails the job (and the run).
          # Proves default-deny across BOTH role paths (DEC-0009), provenance FK
          # RESTRICT to raw, queue dedup, version/decision CHECKs, and mutability
          # (this is a staging queue, NOT a frozen snapshot).
          psql "$SUPABASE_DB_URL" -v ON_ERROR_STOP=1 \
            -f supabase/tests/entity_resolution_candidates_post_apply_verify.sql
